<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flappy Bird</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Arial', sans-serif;
    }
    canvas {
      display: block;
      border: 3px solid #16213e;
      border-radius: 4px;
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Responsive sizing
const BASE_W = 320, BASE_H = 568;
let scale = 1;
function resize() {
  const maxH = window.innerHeight * 0.96;
  const maxW = window.innerWidth * 0.96;
  scale = Math.min(maxW / BASE_W, maxH / BASE_H);
  canvas.width = BASE_W;
  canvas.height = BASE_H;
  canvas.style.width = (BASE_W * scale) + 'px';
  canvas.style.height = (BASE_H * scale) + 'px';
}
resize();
window.addEventListener('resize', resize);

// ─── Audio (Web Audio API) ───────────────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}
function playTone(freq, type, duration, vol = 0.3, startTime = 0) {
  try {
    const ac = getAudio();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain);
    gain.connect(ac.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ac.currentTime + startTime);
    gain.gain.setValueAtTime(vol, ac.currentTime + startTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + startTime + duration);
    osc.start(ac.currentTime + startTime);
    osc.stop(ac.currentTime + startTime + duration);
  } catch(e) {}
}
function sfxFlap() {
  playTone(440, 'square', 0.08, 0.2);
  playTone(600, 'square', 0.06, 0.15, 0.04);
}
function sfxScore() {
  playTone(880, 'sine', 0.1, 0.25);
  playTone(1100, 'sine', 0.1, 0.25, 0.1);
  playTone(1320, 'sine', 0.15, 0.3, 0.2);
}
function sfxDie() {
  playTone(300, 'sawtooth', 0.1, 0.3);
  playTone(200, 'sawtooth', 0.15, 0.35, 0.1);
  playTone(100, 'sawtooth', 0.3, 0.4, 0.25);
}
function sfxHit() {
  playTone(150, 'square', 0.08, 0.4);
}

// ─── Constants ───────────────────────────────────────────────────────────────
const W = BASE_W, H = BASE_H;
const GRAVITY       = 0.45;
const FLAP_POWER    = -8.5;
const PIPE_W        = 52;
const PIPE_GAP      = 148;
const PIPE_SPEED    = 2.4;
const PIPE_INTERVAL = 90; // frames
const GROUND_H      = 80;
const SKY_H         = H - GROUND_H;

// ─── Colors / Theme ──────────────────────────────────────────────────────────
const COLORS = {
  skyTop:    '#64b3f4',
  skyBot:    '#c2e9fb',
  ground:    '#ded895',
  groundDk:  '#c0a83a',
  pipe:      '#73bf2e',
  pipeDk:    '#4a8c1c',
  pipeCap:   '#5aad1a',
  pipeCapDk: '#3a7a0a',
  birdBody:  '#ffe234',
  birdWing:  '#f5c800',
  birdEye:   '#ffffff',
  birdPupil: '#222222',
  birdBeak:  '#f08c00',
  birdBlush: '#f9a8a8',
  cloudFill: 'rgba(255,255,255,0.85)',
  scoreText: '#ffffff',
  scoreShadow:'#333333',
};

// ─── Game State ──────────────────────────────────────────────────────────────
const STATE = { MENU: 0, PLAY: 1, DEAD: 2, READY: 3 };
let state = STATE.MENU;

let bird, pipes, score, bestScore, frame, groundOffset, particles;
let deathTimer = 0;
let flashAlpha = 0;
let clouds = [];
let bgStars = [];

function initClouds() {
  clouds = [];
  for (let i = 0; i < 5; i++) {
    clouds.push({
      x: Math.random() * W,
      y: 30 + Math.random() * 120,
      w: 60 + Math.random() * 60,
      speed: 0.3 + Math.random() * 0.4,
    });
  }
}
function initStars() {
  bgStars = [];
  for (let i = 0; i < 30; i++) {
    bgStars.push({ x: Math.random() * W, y: Math.random() * SKY_H * 0.5, r: Math.random() * 1.5 + 0.5 });
  }
}

function resetGame() {
  bird = {
    x: 72,
    y: H / 2 - 20,
    vy: 0,
    angle: 0,
    wingPhase: 0,
    dead: false,
    hitGround: false,
    blinkTimer: 0,
  };
  pipes = [];
  score = 0;
  frame = 0;
  groundOffset = 0;
  particles = [];
  deathTimer = 0;
  flashAlpha = 0;
}

bestScore = parseInt(localStorage.getItem('flappy_best') || '0');

// ─── Draw Helpers ─────────────────────────────────────────────────────────────
function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, SKY_H);
  grad.addColorStop(0, COLORS.skyTop);
  grad.addColorStop(1, COLORS.skyBot);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, SKY_H);
}

function drawCloud(c) {
  ctx.fillStyle = COLORS.cloudFill;
  const x = c.x, y = c.y, w = c.w;
  ctx.beginPath();
  ctx.arc(x, y, w * 0.25, 0, Math.PI * 2);
  ctx.arc(x + w * 0.2, y - w * 0.12, w * 0.2, 0, Math.PI * 2);
  ctx.arc(x + w * 0.45, y - w * 0.05, w * 0.22, 0, Math.PI * 2);
  ctx.arc(x + w * 0.7, y, w * 0.18, 0, Math.PI * 2);
  ctx.fill();
}

function drawGround() {
  // dirt layer
  ctx.fillStyle = COLORS.ground;
  ctx.fillRect(0, SKY_H, W, GROUND_H);
  // top grass strip
  ctx.fillStyle = '#7ec850';
  ctx.fillRect(0, SKY_H, W, 14);
  ctx.fillStyle = '#5aad1a';
  ctx.fillRect(0, SKY_H + 14, W, 4);
  // animated dirt bumps
  ctx.fillStyle = COLORS.groundDk;
  for (let x = (-groundOffset % 48); x < W + 48; x += 48) {
    ctx.fillRect(x, SKY_H + 22, 32, 8);
  }
}

function drawPipe(pipe) {
  const px = pipe.x;
  const topH = pipe.topH;
  const botY = topH + PIPE_GAP;
  const botH = SKY_H - botY;
  const capH = 26, capW = PIPE_W + 10;

  // top pipe body
  const gTop = ctx.createLinearGradient(px, 0, px + PIPE_W, 0);
  gTop.addColorStop(0, COLORS.pipeDk);
  gTop.addColorStop(0.35, COLORS.pipe);
  gTop.addColorStop(1, COLORS.pipeDk);
  ctx.fillStyle = gTop;
  ctx.fillRect(px, 0, PIPE_W, topH);

  // top pipe cap
  const gCapT = ctx.createLinearGradient(px - 5, 0, px + PIPE_W + 5, 0);
  gCapT.addColorStop(0, COLORS.pipeCapDk);
  gCapT.addColorStop(0.35, COLORS.pipeCap);
  gCapT.addColorStop(1, COLORS.pipeCapDk);
  ctx.fillStyle = gCapT;
  ctx.fillRect(px - 5, topH - capH, capW, capH);

  // bottom pipe body
  ctx.fillStyle = gTop;
  ctx.fillRect(px, botY, PIPE_W, botH);

  // bottom pipe cap
  ctx.fillStyle = gCapT;
  ctx.fillRect(px - 5, botY, capW, capH);

  // shine highlights
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(px + 6, 0, 8, topH);
  ctx.fillRect(px + 6, botY + capH, 8, botH - capH);
}

function drawBird() {
  const b = bird;
  const cx = b.x, cy = b.y;
  const angle = b.dead ? Math.min(b.angle, Math.PI * 0.7) : b.angle;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);

  const R = 13;
  // body
  ctx.fillStyle = COLORS.birdBody;
  ctx.beginPath();
  ctx.ellipse(0, 0, R, R - 1, 0, 0, Math.PI * 2);
  ctx.fill();

  // wing animation
  const wingAngle = Math.sin(b.wingPhase) * 0.5;
  ctx.save();
  ctx.rotate(-0.2 + wingAngle);
  ctx.fillStyle = COLORS.birdWing;
  ctx.beginPath();
  ctx.ellipse(-2, 3, 9, 5, -0.4, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // blush
  ctx.fillStyle = COLORS.birdBlush;
  ctx.globalAlpha = 0.5;
  ctx.beginPath();
  ctx.ellipse(4, 4, 4, 2.5, 0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // eye white
  const eyeOpen = (b.blinkTimer > 0) ? false : true;
  ctx.fillStyle = COLORS.birdEye;
  ctx.beginPath();
  if (eyeOpen) {
    ctx.arc(5, -4, 5, 0, Math.PI * 2);
  } else {
    ctx.ellipse(5, -4, 5, 1.5, 0, 0, Math.PI * 2);
  }
  ctx.fill();

  // pupil
  if (eyeOpen) {
    ctx.fillStyle = COLORS.birdPupil;
    ctx.beginPath();
    ctx.arc(6.5, -4.5, 2.5, 0, Math.PI * 2);
    ctx.fill();
    // shine
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(7, -5.2, 0.9, 0, Math.PI * 2);
    ctx.fill();
  }

  // beak
  ctx.fillStyle = COLORS.birdBeak;
  ctx.beginPath();
  ctx.moveTo(R - 2, -2);
  ctx.lineTo(R + 8, 1);
  ctx.lineTo(R - 2, 4);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function spawnParticles(x, y) {
  const cols = ['#ffe234', '#ff8800', '#ff4444', '#ffffff', '#ffcc00'];
  for (let i = 0; i < 20; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.5 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      r: 2 + Math.random() * 3,
      life: 1,
      decay: 0.025 + Math.random() * 0.02,
      color: cols[Math.floor(Math.random() * cols.length)],
    });
  }
}

// ─── UI ────────────────────────────────────────────────────────────────────
function drawRoundedRect(x, y, w, h, r, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  if (fill)   { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 2; ctx.stroke(); }
}

function drawText(text, x, y, size, color, align = 'center', shadow = true) {
  ctx.font = `bold ${size}px Arial, sans-serif`;
  ctx.textAlign = align;
  ctx.textBaseline = 'middle';
  if (shadow) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillText(text, x + 2, y + 2);
  }
  ctx.fillStyle = color;
  ctx.fillText(text, x, y);
}

function drawScore() {
  drawText(score.toString(), W / 2, 68, 42, '#ffffff');
}

function drawMenuScreen() {
  // Title panel
  drawRoundedRect(40, 90, W - 80, 88, 10, 'rgba(0,0,0,0.4)', '#f7d51d');
  drawText('FLAPPY BIRD', W / 2, 118, 30, '#f7d51d');
  drawText('🐦', W / 2, 152, 24, '#ffffff', 'center', false);

  // instructions
  drawRoundedRect(55, 310, W - 110, 50, 8, 'rgba(0,0,0,0.35)', 'rgba(255,255,255,0.3)');
  drawText('לחץ/הקש להתחלה', W / 2, 328, 15, '#ffffff');
  drawText('SPACE / CLICK / TAP', W / 2, 346, 12, '#ffffffcc');

  // best score
  if (bestScore > 0) {
    drawRoundedRect(W/2 - 60, 378, 120, 34, 6, 'rgba(0,0,0,0.3)', '#f7d51d');
    drawText(`שיא: ${bestScore}`, W / 2, 395, 15, '#f7d51d');
  }
}

function drawReadyScreen() {
  drawRoundedRect(W/2 - 80, 55, 160, 36, 8, 'rgba(0,0,0,0.4)', '#ffffff');
  drawText('מוכן?', W / 2, 73, 20, '#ffffff');
  // tap hint arrow
  const pulse = 0.7 + 0.3 * Math.sin(frame * 0.12);
  ctx.globalAlpha = pulse;
  drawText('▼ לחץ לעוף ▼', W / 2, H / 2 + 80, 14, '#ffffff');
  ctx.globalAlpha = 1;
}

function drawGameOver() {
  // dim overlay
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0, 0, W, H);

  // Game Over banner
  drawRoundedRect(30, H/2 - 100, W - 60, 56, 10, '#d43f2e', '#ffffff');
  drawText('GAME OVER', W / 2, H/2 - 72, 28, '#ffffff');

  // score board
  drawRoundedRect(40, H/2 - 35, W - 80, 90, 8, 'rgba(255,255,255,0.15)', '#f7d51d');
  drawText(`ניקוד:  ${score}`, W / 2, H/2 - 10, 18, '#ffffff');
  drawText(`שיא:   ${bestScore}`, W / 2, H/2 + 18, 18, '#f7d51d');

  if (score >= bestScore && score > 0) {
    const pulse = 0.7 + 0.3 * Math.sin(frame * 0.15);
    ctx.globalAlpha = pulse;
    drawText('!שיא חדש', W / 2, H/2 + 46, 16, '#ffcc00');
    ctx.globalAlpha = 1;
  }

  // restart hint
  const pulse2 = 0.7 + 0.3 * Math.sin(frame * 0.1);
  ctx.globalAlpha = pulse2;
  drawRoundedRect(W/2 - 80, H/2 + 68, 160, 36, 18, 'rgba(255,255,255,0.25)', '#ffffff');
  drawText('לחץ לשחק שוב', W / 2, H/2 + 86, 14, '#ffffff');
  ctx.globalAlpha = 1;
}

// ─── Update ───────────────────────────────────────────────────────────────────
function update() {
  frame++;

  // clouds
  for (const c of clouds) {
    c.x -= c.speed * (state === STATE.PLAY ? 1 : 0.5);
    if (c.x + c.w < 0) { c.x = W + 20; c.y = 30 + Math.random() * 120; }
  }

  if (state === STATE.PLAY) {
    groundOffset += PIPE_SPEED;

    // bird physics
    bird.vy += GRAVITY;
    bird.y += bird.vy;
    bird.angle = Math.min(Math.PI / 2, Math.max(-0.4, bird.vy * 0.07));
    bird.wingPhase += 0.25;

    // blink timer
    bird.blinkTimer = Math.max(0, bird.blinkTimer - 1);
    if (Math.random() < 0.005) bird.blinkTimer = 8;

    // spawn pipes
    if (frame % PIPE_INTERVAL === 0) {
      const minTop = 60, maxTop = SKY_H - PIPE_GAP - 60;
      pipes.push({ x: W + 10, topH: minTop + Math.random() * (maxTop - minTop), scored: false });
    }

    // update pipes
    for (let i = pipes.length - 1; i >= 0; i--) {
      const p = pipes[i];
      p.x -= PIPE_SPEED;
      // scoring
      if (!p.scored && p.x + PIPE_W < bird.x - 13) {
        p.scored = true;
        score++;
        sfxScore();
        if (score > bestScore) { bestScore = score; localStorage.setItem('flappy_best', bestScore); }
      }
      if (p.x + PIPE_W < -10) pipes.splice(i, 1);
    }

    // collision
    if (!bird.dead) {
      const bR = 10;
      // ground
      if (bird.y + bR >= SKY_H) {
        bird.y = SKY_H - bR;
        bird.dead = true;
        bird.hitGround = true;
        sfxDie();
        sfxHit();
        spawnParticles(bird.x, bird.y);
        deathTimer = 90;
        state = STATE.DEAD;
      }
      // ceiling
      if (bird.y - bR <= 0) { bird.y = bR; bird.vy = 0; }
      // pipes
      for (const p of pipes) {
        const inX = bird.x + bR > p.x + 5 && bird.x - bR < p.x + PIPE_W - 5;
        const inY = bird.y - bR < p.topH || bird.y + bR > p.topH + PIPE_GAP;
        if (inX && inY) {
          bird.dead = true;
          sfxHit();
          sfxDie();
          spawnParticles(bird.x, bird.y);
          deathTimer = 90;
          state = STATE.DEAD;
          flashAlpha = 0.6;
          break;
        }
      }
    }
  }

  if (state === STATE.DEAD) {
    deathTimer = Math.max(0, deathTimer - 1);
    flashAlpha = Math.max(0, flashAlpha - 0.03);
    // bird falls after hit
    if (!bird.hitGround) {
      bird.vy += GRAVITY * 0.8;
      bird.y = Math.min(bird.y + bird.vy, SKY_H - 10);
      bird.angle = Math.min(bird.angle + 0.08, Math.PI * 0.7);
    }
  }

  // particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.15;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ─── Draw ─────────────────────────────────────────────────────────────────────
function draw() {
  // sky
  drawSky();

  // clouds
  for (const c of clouds) drawCloud(c);

  // pipes
  for (const p of pipes) drawPipe(p);

  // ground
  drawGround();

  // particles
  drawParticles();

  // bird
  if (state !== STATE.MENU) drawBird();

  // flash on collision
  if (flashAlpha > 0) {
    ctx.fillStyle = `rgba(255,255,255,${flashAlpha})`;
    ctx.fillRect(0, 0, W, H);
  }

  // UI overlays
  if (state === STATE.MENU)  { drawMenuScreen(); drawBirdMenu(); }
  if (state === STATE.READY) drawReadyScreen();
  if (state === STATE.PLAY)  drawScore();
  if (state === STATE.DEAD)  { drawScore(); if (deathTimer < 60) drawGameOver(); }
}

function drawBirdMenu() {
  // animated bird on menu
  const by = H / 2 - 10 + Math.sin(frame * 0.05) * 10;
  ctx.save();
  ctx.translate(W / 2, by);
  ctx.rotate(Math.sin(frame * 0.04) * 0.15);

  const R = 18;
  ctx.fillStyle = COLORS.birdBody;
  ctx.beginPath();
  ctx.ellipse(0, 0, R, R - 1, 0, 0, Math.PI * 2);
  ctx.fill();

  const wingAngle = Math.sin(frame * 0.18) * 0.6;
  ctx.save();
  ctx.rotate(-0.2 + wingAngle);
  ctx.fillStyle = COLORS.birdWing;
  ctx.beginPath();
  ctx.ellipse(-2, 4, 12, 6, -0.4, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  ctx.fillStyle = COLORS.birdEye;
  ctx.beginPath();
  ctx.arc(6, -5, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = COLORS.birdPupil;
  ctx.beginPath();
  ctx.arc(7.5, -5.5, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(8.2, -6.5, 1.1, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = COLORS.birdBeak;
  ctx.beginPath();
  ctx.moveTo(R - 2, -3);
  ctx.lineTo(R + 10, 1);
  ctx.lineTo(R - 2, 5);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

// ─── Input ────────────────────────────────────────────────────────────────────
function flap() {
  if (state === STATE.MENU || state === STATE.READY) {
    resetGame();
    state = STATE.PLAY;
    bird.vy = FLAP_POWER;
    sfxFlap();
    return;
  }
  if (state === STATE.PLAY && !bird.dead) {
    bird.vy = FLAP_POWER;
    bird.wingPhase = 0;
    sfxFlap();
  }
  if (state === STATE.DEAD && deathTimer < 50) {
    state = STATE.MENU;
    resetGame();
  }
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); flap(); }
});
canvas.addEventListener('click', e => { e.preventDefault(); flap(); });
canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); }, { passive: false });

// ─── Loop ─────────────────────────────────────────────────────────────────────
initClouds();
initStars();
resetGame();

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
